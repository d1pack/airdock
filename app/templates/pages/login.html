<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - Airdock</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}?v=neon-20260429-3">
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__brand">
          <span class="brand__mark">AD</span>
          <div>
            <p class="eyebrow">Безопасная админка Docker</p>
            <h1>Airdock</h1>
          </div>
        </div>

        {% if error == "invalid" %}
          <section class="alert">Неверный логин или пароль.</section>
        {% elif error == "expired" %}
          <section class="alert">Сессия истекла. Войдите снова.</section>
        {% endif %}

        <form class="form auth-form" method="post" action="/login">
          <label>
            Имя пользователя
            <input name="username" required autocomplete="username" autofocus>
          </label>
          <label>
            Пароль
            <input name="password" type="password" required autocomplete="current-password">
          </label>
          <button class="button" type="submit">
            <i data-lucide="log-in" aria-hidden="true"></i>
            Войти
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
