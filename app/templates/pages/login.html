<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - AirDock</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/static/js/app.js"></script>
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__brand auth-card__brand--logo">
          <img class="auth-logo" src="/static/img/airdock-logo-dark.png" alt="AirDock">
          <div>
            <p class="eyebrow">Безопасная админ-панель Docker</p>
            <h1>Вход в AirDock</h1>
          </div>
        </div>

        {% if error == "invalid" %}
          <section class="alert">Неверный логин или пароль.</section>
        {% elif error == "expired" %}
          <section class="alert">Сессия истекла. Войдите снова.</section>
        {% endif %}

        <form class="form auth-form" method="post" action="/dashboard/login">
          <label>
            Имя пользователя
            <input name="username" required autocomplete="username" autofocus>
          </label>
          <label>
            Пароль
            <input name="password" type="password" required autocomplete="current-password">
          </label>
          <button class="button" type="submit">
            <i data-lucide="log-in" aria-hidden="true"></i>
            Войти
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
